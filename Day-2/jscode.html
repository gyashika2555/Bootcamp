    <script>


        // <-- regular function -->
        function Demo(a, b) {
            console.log(a + b)
        }
        Demo(5, 10)


        // < --arrow function -->
        const Demo = () => {
            // console.log(a+B)
            return a + b
        }
        console.log(Demo(5, 10))


        // call back function
        callback = demo
        function sample(callback) {
            console.log("sample");
            callback();
        }
    // < -- function demo() {
    //         console.log("demo1")
    //     } -->
            sample(demo);
        sample(() => {
            console.log("demo")
        });
